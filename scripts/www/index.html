<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <title>老年照护系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
    }
    #app {
      min-height: 100vh;
      background: #0a0a1a;
    }
    /* 加载提示 */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      z-index: 9999;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-kgHM42J5.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-IJyzvBuT.css">
</head>
<body>
  <div id="loading">加载中...</div>
  <div id="app"></div>
  <script>
    // 豹小秘mini 兼容性处理
    window.onerror = function(msg, url, line) {
      console.error('Error: ' + msg + '\nURL: ' + url + '\nLine: ' + line);
      document.getElementById('loading').innerHTML = '加载出错，请刷新重试';
      return false;
    };
    // 隐藏加载提示
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }, 500);
    });
  </script>
</body>
</html>
