<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- 背景 -->
  <rect width="200" height="200" fill="#fafafa"/>
  
  <!-- 第一个五边形 -->
  <polygon points="100,20 170,70 145,150 55,150 30,70" 
           fill="none" 
           stroke="#333" 
           stroke-width="2"/>
  
  <!-- 第二个五边形（旋转交叉） -->
  <polygon points="100,40 150,80 130,140 70,140 50,80" 
           fill="none" 
           stroke="#333" 
           stroke-width="2"/>
</svg>